syntax = "proto3";

package ournezt.v1;

option go_package = "github.com/OurNeZt/ournezt-core/internal/gen/proto/ournezt/v1;ourneztv1";

service AuthService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateSession(ValidateSessionRequest) returns (ValidateSessionResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc UpdateMyAccount(UpdateMyAccountRequest) returns (User);
  rpc GenerateAdminAccessKey(GenerateAdminAccessKeyRequest) returns (GenerateAdminAccessKeyResponse);
  rpc ConsumeAdminAccessKey(ConsumeAdminAccessKeyRequest) returns (ConsumeAdminAccessKeyResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc DisableUser(DisableUserRequest) returns (DisableUserResponse);
}

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  string role = 4;
  bool disabled = 5;
  bool must_change_password = 6;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
  string session_token = 2;
}

message ValidateSessionRequest {
  string session_token = 1;
}

message ValidateSessionResponse {
  User user = 1;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message UpdateMyAccountRequest {
  string email = 1;
  string display_name = 2;
}

message GenerateAdminAccessKeyRequest {}

message GenerateAdminAccessKeyResponse {
  string access_key = 1;
  string expires_at = 2;
}

message ConsumeAdminAccessKeyRequest {
  string access_key = 1;
}

message ConsumeAdminAccessKeyResponse {
  bool access_granted = 1;
}

message ListUsersRequest {}

message ListUsersResponse {
  repeated User users = 1;
}

message CreateUserRequest {
  string email = 1;
  string display_name = 2;
  string password = 3;
  string role = 4;
}

message DisableUserRequest {
  string user_id = 1;
}

message DisableUserResponse {}

