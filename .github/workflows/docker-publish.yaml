name: docker-publish

on:
  pull_request:
    branches: [dev]
    types: [closed]

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to rebuild, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  guard:
    runs-on: ubuntu-latest

    outputs:
      ok: ${{ steps.check.outputs.ok }}
      tag: ${{ steps.check.outputs.tag }}
      checkout_ref: ${{ steps.check.outputs.checkout_ref }}

    steps:
      - name: Check trigger
        id: check
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"

            if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Invalid tag format: $TAG"
              echo "Expected format: vX.Y.Z"
              exit 1
            fi

            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=$TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.pull_request.merged }}" != "true" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.ref }}"

          if [ "$BASE" != "dev" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "$HEAD" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="${HEAD#release/}"

          echo "ok=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=${{ github.event.pull_request.merge_commit_sha }}" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: guard

    if: ${{ needs.guard.outputs.ok == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.guard.outputs.checkout_ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ournezt-core
          tags: |
            type=raw,value=${{ needs.guard.outputs.tag }}
            type=raw,value=latest

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
